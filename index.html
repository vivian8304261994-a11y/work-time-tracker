<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工時記錄 ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Nunito','微軟正黑體',sans-serif;
  min-height:100vh;
  background:linear-gradient(160deg,#fce4ec 0%,#ede7f6 50%,#e0f2f1 100%);
  padding-bottom:50px;
}

/* ── Header ── */
.header{
  background:linear-gradient(135deg,#ff6b9d 0%,#c44dff 60%,#7c4dff 100%);
  padding:28px 20px 22px;
  text-align:center;
  border-radius:0 0 32px 32px;
  box-shadow:0 6px 24px rgba(124,77,255,.3);
  position:relative;overflow:hidden;
}
.header::before{
  content:'✦';position:absolute;top:10px;left:20px;
  font-size:1.4rem;color:rgba(255,255,255,.4);
}
.header::after{
  content:'✦';position:absolute;top:14px;right:24px;
  font-size:1rem;color:rgba(255,255,255,.3);
}
.header h1{color:#fff;font-size:1.65rem;font-weight:900;letter-spacing:2px}
.header p{color:rgba(255,255,255,.82);font-size:.85rem;margin-top:5px;font-weight:600}

/* ── Month nav ── */
.month-wrap{padding:14px 16px 0}
.month-nav{
  display:flex;align-items:center;justify-content:center;gap:14px;
  background:#fff;border-radius:18px;padding:12px 18px;
  box-shadow:0 3px 14px rgba(0,0,0,.07);
}
.month-nav button{
  background:#f3f0ff;border:none;color:#7c4dff;
  width:38px;height:38px;border-radius:50%;
  font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;font-weight:800;
  flex-shrink:0;
}
.month-nav button:hover{background:#7c4dff;color:#fff;transform:scale(1.05)}
.month-nav button:disabled{opacity:.35;cursor:default;transform:none}
.month-label{font-size:1.25rem;font-weight:900;color:#4a2fbd;min-width:130px;text-align:center}

/* ── Content ── */
.content{padding:14px 14px 0;max-width:540px;margin:0 auto}

/* ── Card ── */
.card{
  background:#fff;border-radius:22px;padding:20px;
  box-shadow:0 3px 18px rgba(0,0,0,.07);
  margin-bottom:14px;
}
.card-title{
  font-size:1.05rem;font-weight:900;color:#7c4dff;
  margin-bottom:16px;display:flex;align-items:center;gap:7px;
}

/* ── Form ── */
.form-row{margin-bottom:12px}
.form-row label{
  display:block;font-size:.78rem;font-weight:800;
  color:#aaa;margin-bottom:5px;
  text-transform:uppercase;letter-spacing:.8px;
}
.form-row input,.form-row select{
  width:100%;padding:12px 14px;
  border:2px solid #f0eeff;border-radius:14px;
  font-size:.97rem;font-family:inherit;color:#333;
  background:#faf9ff;transition:border-color .2s,background .2s;
  -webkit-appearance:none;appearance:none;
}
.form-row input:focus,.form-row select:focus{
  outline:none;border-color:#c44dff;background:#fff;
}
.hours-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.person-wrap{position:relative}
.person-badge{
  position:absolute;left:11px;top:50%;transform:translateY(-50%);
  font-size:.75rem;font-weight:900;padding:3px 8px;border-radius:20px;
  pointer-events:none;
}
.jie-badge{background:#ede0ff;color:#7c4dff}
.feng-badge{background:#d5eeff;color:#0288d1}
.person-wrap input{padding-left:50px}

.btn-submit{
  width:100%;padding:14px;margin-top:6px;
  background:linear-gradient(135deg,#ff6b9d,#7c4dff);
  color:#fff;border:none;border-radius:16px;
  font-size:1.05rem;font-weight:900;font-family:inherit;
  cursor:pointer;letter-spacing:1.5px;
  box-shadow:0 5px 18px rgba(124,77,255,.35);
  transition:opacity .2s,transform .1s;
}
.btn-submit:hover{opacity:.9}
.btn-submit:active{transform:scale(.98)}

.btn-cancel-edit{
  width:100%;padding:10px;margin-top:8px;
  background:#f5f5f5;color:#aaa;border:none;
  border-radius:14px;font-size:.9rem;font-weight:700;
  font-family:inherit;cursor:pointer;display:none;
}
.btn-cancel-edit:hover{background:#eee}

.quick-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.btn-quick{
  padding:12px 8px;border:none;border-radius:14px;
  font-size:.95rem;font-weight:900;font-family:inherit;
  cursor:pointer;letter-spacing:1px;
  transition:opacity .2s,transform .1s;
}
.btn-quick:active{transform:scale(.97)}
.btn-leave{
  background:linear-gradient(135deg,#ffb347,#ff6b35);
  color:#fff;
  box-shadow:0 4px 14px rgba(255,107,53,.35);
}
.btn-leave:hover{opacity:.88}
.btn-nocall{
  background:linear-gradient(135deg,#b0bec5,#78909c);
  color:#fff;
  box-shadow:0 4px 14px rgba(120,144,156,.3);
}
.btn-nocall:hover{opacity:.88}

.edit-banner{
  background:linear-gradient(135deg,#fff8e1,#fff3e0);
  border:2px dashed #ffc107;border-radius:12px;
  padding:8px 14px;font-size:.83rem;font-weight:700;
  color:#e65100;margin-bottom:12px;display:none;
}
.edit-banner.show{display:block}

/* ── Record cards ── */
.record-card{
  display:flex;align-items:center;gap:10px;
  background:#faf9ff;border-radius:16px;
  padding:12px 13px;margin-bottom:8px;
  border:2px solid #f0eeff;
  transition:border-color .2s,transform .15s;
}
.record-card:hover{border-color:#c44dff;transform:translateX(2px)}

.rec-day{
  background:linear-gradient(135deg,#7c4dff,#c44dff);
  color:#fff;font-weight:900;font-size:.9rem;
  width:42px;height:42px;border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.rec-info{flex:1;min-width:0}
.rec-loc{
  font-weight:700;color:#333;font-size:.93rem;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.rec-tags{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap}
.tag{font-size:.73rem;font-weight:800;padding:2px 9px;border-radius:20px}
.tag-jie{background:#ede0ff;color:#7c4dff}
.tag-feng{background:#d5eeff;color:#0288d1}

.rec-btns{display:flex;gap:6px;flex-shrink:0}
.rec-btn{
  width:34px;height:34px;border:none;border-radius:10px;
  cursor:pointer;font-size:.95rem;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.rec-btn-edit{background:#f3f0ff;color:#7c4dff}
.rec-btn-del{background:#fff0f5;color:#ff4081}
.rec-btn-edit:hover{background:#7c4dff;color:#fff}
.rec-btn-del:hover{background:#ff4081;color:#fff}

/* ── Summary ── */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sum-box{padding:14px;border-radius:16px;text-align:center}
.sum-box.jie{background:linear-gradient(135deg,#f3e8ff,#ede0ff)}
.sum-box.feng{background:linear-gradient(135deg,#e0f4ff,#d5eeff)}
.sum-name{font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:1px}
.sum-box.jie .sum-name{color:#9c4dff}
.sum-box.feng .sum-name{color:#0288d1}
.sum-num{font-size:2rem;font-weight:900;line-height:1.2;margin-top:2px}
.sum-box.jie .sum-num{color:#7c4dff}
.sum-box.feng .sum-num{color:#0288d1}
.sum-unit{font-size:.75rem;color:#bbb;font-weight:700}

/* ── Empty ── */
.empty{text-align:center;padding:28px 16px;color:#ccc}
.empty-icon{font-size:3.2rem;margin-bottom:10px}
.empty p{font-size:.9rem;font-weight:700;line-height:1.7}

/* ── Toast ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:linear-gradient(135deg,#7c4dff,#c44dff);
  color:#fff;padding:11px 24px;border-radius:50px;
  font-size:.9rem;font-weight:800;
  box-shadow:0 5px 20px rgba(124,77,255,.45);
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;z-index:999;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── Decorative dots ── */
.dots{
  text-align:center;padding:8px 0 4px;
  font-size:1rem;color:#d4b8ff;letter-spacing:6px;
}

/* ── Report button & table ── */
.btn-report{
  width:100%;padding:14px;margin-bottom:14px;
  background:linear-gradient(135deg,#43cea2,#185a9d);
  color:#fff;border:none;border-radius:16px;
  font-size:1.05rem;font-weight:900;font-family:inherit;
  cursor:pointer;letter-spacing:1.5px;
  box-shadow:0 5px 18px rgba(24,90,157,.28);
  transition:opacity .2s,transform .1s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-report:hover{opacity:.9}
.btn-report:active{transform:scale(.98)}

.table-section{display:none}
.table-section.open{display:block}
.table-wrap{overflow-x:auto}
table.monthly{
  width:100%;border-collapse:collapse;
  font-size:.88rem;font-family:inherit;
}
table.monthly th,table.monthly td{
  border:1px solid #d8d0f0;padding:5px 8px;text-align:center;
}
table.monthly thead th{
  background:linear-gradient(135deg,#ede7f6,#e8eaf6);
  font-weight:900;color:#5e35b1;font-size:.9rem;height:32px;
}
table.monthly th.col-loc{text-align:left}
table.monthly td.t-day{color:#7c4dff;font-weight:800}
table.monthly td.t-loc{
  text-align:left;color:#555;
  max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
table.monthly td.t-num{color:#4a2fbd;font-weight:700}
table.monthly tr.t-leave td{background:#fff8f0}
table.monthly tr.t-leave td.t-loc{color:#e65100;font-weight:700}
table.monthly tr.t-nocall td{background:#f7f9fa}
table.monthly tr.t-nocall td.t-loc{color:#78909c;font-weight:700}
table.monthly tr.t-total td{
  background:linear-gradient(135deg,#fce4ec,#f3e5f5);
  font-weight:900;border-top:2px solid #ce93d8;
}
table.monthly .total-label{color:#c0392b;font-weight:900}
</style>
</head>
<body>

<div class="header">
  <h1>🌟 工時月記錄</h1>
  <p>每天去哪裡工作、做了多少小時 ✨</p>
</div>

<div class="month-wrap">
  <div class="month-nav">
    <button id="btnPrev" onclick="changeMonth(-1)">◀</button>
    <div class="month-label" id="monthLabel"></div>
    <button onclick="changeMonth(1)">▶</button>
  </div>
</div>

<div class="content">

  <!-- Add / Edit form -->
  <div class="card">
    <div class="card-title" id="formTitle">📝 新增記錄</div>
    <div class="edit-banner" id="editBanner"></div>

    <form id="mainForm" onsubmit="saveRecord(event)">
      <input type="hidden" id="editId">

      <div class="form-row">
        <label>📅 幾號</label>
        <select id="inputDay"></select>
      </div>

      <div class="form-row">
        <label>📍 工作地點</label>
        <input type="text" id="inputLoc" placeholder="台北辦公室、工廠、家裡…" autocomplete="off">
      </div>

      <div class="hours-grid">
        <div class="form-row">
          <label>傑 ・ 幾小時</label>
          <div class="person-wrap">
            <span class="person-badge jie-badge">傑</span>
            <input type="number" id="inputJie" placeholder="0" min="0" max="24" step="0.5">
          </div>
        </div>
        <div class="form-row">
          <label>峰 ・ 幾小時</label>
          <div class="person-wrap">
            <span class="person-badge feng-badge">峰</span>
            <input type="number" id="inputFeng" placeholder="0" min="0" max="24" step="0.5">
          </div>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">✨ 新增</button>
      <button type="button" class="btn-cancel-edit" id="cancelBtn" onclick="cancelEdit()">✕ 取消編輯</button>
      <div class="quick-btns">
        <button type="button" class="btn-quick btn-leave" onclick="quickSave('請假')">🌴 請假</button>
        <button type="button" class="btn-quick btn-nocall" onclick="quickSave('沒叫')">😴 沒叫</button>
      </div>
    </form>
  </div>

  <!-- Records -->
  <div class="card">
    <div class="card-title">
      📋 本月記錄
      <span id="recCount" style="font-weight:700;color:#ccc;font-size:.83rem"></span>
    </div>

    <div class="summary-grid" id="summaryGrid" style="display:none">
      <div class="sum-box jie">
        <div class="sum-name">傑 總計</div>
        <div class="sum-num" id="jieTotal">0</div>
        <div class="sum-unit">小時</div>
      </div>
      <div class="sum-box feng">
        <div class="sum-name">峰 總計</div>
        <div class="sum-num" id="fengTotal">0</div>
        <div class="sum-unit">小時</div>
      </div>
    </div>

    <div id="recordsList"></div>
  </div>

  <div class="dots">· · ·</div>

  <button class="btn-report" id="btnReport" onclick="toggleTable()">📊 查看月報表</button>

  <div class="table-section card" id="tableSection">
    <div class="table-wrap">
      <table class="monthly">
        <thead>
          <tr>
            <th style="width:38px"></th>
            <th class="col-loc"></th>
            <th style="width:60px">傑</th>
            <th style="width:60px">峰</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY='worklog_v1';
const S_YEAR=2026,S_MONTH=6;
let curYear=S_YEAR,curMonth=S_MONTH,editingId=null;

function getData(){try{return JSON.parse(localStorage.getItem(KEY)||'[]');}catch{return[];}}
function setData(d){localStorage.setItem(KEY,JSON.stringify(d));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function daysInMonth(y,m){return new Date(y,m,0).getDate();}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('show'),2000);
}

function changeMonth(d){
  let m=curMonth+d,y=curYear;
  if(m>12){m=1;y++;}if(m<1){m=12;y--;}
  if(y<S_YEAR||(y===S_YEAR&&m<S_MONTH))return;
  curMonth=m;curYear=y;
  if(editingId)cancelEdit();
  renderAll();
}

function populateDaySelect(){
  const sel=document.getElementById('inputDay');
  const days=daysInMonth(curYear,curMonth);
  const prev=sel.value;
  sel.innerHTML='';
  for(let d=1;d<=days;d++){
    const o=document.createElement('option');
    o.value=d;o.textContent=d+' 日';sel.appendChild(o);
  }
  const today=new Date();
  const def=(curYear===today.getFullYear()&&curMonth===today.getMonth()+1)?today.getDate():1;
  sel.value=(prev&&+prev<=days)?prev:def;
}

function emoji(loc){
  if(!loc)return'📍';
  if(loc==='請假')return'🌴';
  if(loc==='沒叫')return'😴';
  if(/家|home/i.test(loc))return'🏠';
  if(/廠|工廠|factory/i.test(loc))return'🏭';
  if(/辦公|office/i.test(loc))return'🏢';
  if(/台北|臺北/i.test(loc))return'🌆';
  if(/高雄/i.test(loc))return'🌇';
  if(/台中|臺中/i.test(loc))return'🌃';
  if(/外出|出差/i.test(loc))return'🚗';
  return'📍';
}

function quickSave(status){
  const day=+document.getElementById('inputDay').value;
  const data=getData();
  const ex=data.find(r=>r.year===curYear&&r.month===curMonth&&r.day===day);
  if(ex){
    if(!confirm(`${day} 日已有記錄，要改成「${status}」嗎？`))return;
    data[data.indexOf(ex)]={...ex,location:status,jieHours:'',fengHours:''};
  }else{
    data.push({id:uid(),year:curYear,month:curMonth,day,location:status,jieHours:'',fengHours:''});
  }
  setData(data);
  showToast(status==='請假'?'🌴 已記錄請假！':'😴 已記錄沒叫！');
  renderAll();
}

function renderList(){
  const recs=getData().filter(r=>r.year===curYear&&r.month===curMonth).sort((a,b)=>a.day-b.day);
  document.getElementById('recCount').textContent=recs.length?`（${recs.length} 筆）`:'';

  let tj=0,tf=0;
  recs.forEach(r=>{tj+=parseFloat(r.jieHours)||0;tf+=parseFloat(r.fengHours)||0;});

  const sg=document.getElementById('summaryGrid');
  if(recs.length){
    sg.style.display='grid';
    document.getElementById('jieTotal').textContent=tj%1?tj.toFixed(1):tj;
    document.getElementById('fengTotal').textContent=tf%1?tf.toFixed(1):tf;
  }else{sg.style.display='none';}

  const el=document.getElementById('recordsList');
  if(!recs.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">🌸</div><p>這個月還沒有記錄喔～<br>快來新增第一筆吧！</p></div>`;
    return;
  }
  el.innerHTML=recs.map(r=>{
    const j=parseFloat(r.jieHours)||0;
    const f=parseFloat(r.fengHours)||0;
    const isLeave=r.location==='請假';
    const isNocall=r.location==='沒叫';
    const special=isLeave||isNocall;
    const cardStyle=isLeave?'border-color:#ffcc80;background:#fff8f0':isNocall?'border-color:#cfd8dc;background:#f7f9fa':'';
    const dayStyle=isLeave?'background:linear-gradient(135deg,#ffb347,#ff6b35)':isNocall?'background:linear-gradient(135deg,#b0bec5,#78909c)':'';
    const statusTag=isLeave?'<span class="tag" style="background:#ffe0b2;color:#e65100">🌴 請假</span>'
                  :isNocall?'<span class="tag" style="background:#eceff1;color:#546e7a">😴 沒叫</span>':'';
    return`<div class="record-card" style="${cardStyle}">
  <div class="rec-day" style="${dayStyle}">${r.day}</div>
  <div class="rec-info">
    <div class="rec-loc">${emoji(r.location)} ${esc(r.location||'（無地點）')}</div>
    <div class="rec-tags">
      ${special?statusTag:''}
      ${!special&&j?`<span class="tag tag-jie">傑 ${j}h</span>`:''}
      ${!special&&f?`<span class="tag tag-feng">峰 ${f}h</span>`:''}
    </div>
  </div>
  <div class="rec-btns">
    <button class="rec-btn rec-btn-edit" onclick="startEdit('${r.id}')">✏️</button>
    <button class="rec-btn rec-btn-del" onclick="delRecord('${r.id}')">🗑️</button>
  </div>
</div>`}).join('');
}

function saveRecord(e){
  e.preventDefault();
  const day=+document.getElementById('inputDay').value;
  const loc=document.getElementById('inputLoc').value.trim();
  const jie=document.getElementById('inputJie').value;
  const feng=document.getElementById('inputFeng').value;
  if(!loc&&!jie&&!feng){alert('請填入地點或時數 😊');return;}
  const data=getData();
  if(editingId){
    const i=data.findIndex(r=>r.id===editingId);
    if(i>=0)data[i]={...data[i],day,location:loc,jieHours:jie,fengHours:feng};
    editingId=null;showToast('✅ 已儲存！');
  }else{
    const ex=data.find(r=>r.year===curYear&&r.month===curMonth&&r.day===day);
    if(ex){
      if(!confirm(`${day} 日已有記錄，要覆蓋嗎？`))return;
      data[data.indexOf(ex)]={...ex,location:loc,jieHours:jie,fengHours:feng};
    }else{
      data.push({id:uid(),year:curYear,month:curMonth,day,location:loc,jieHours:jie,fengHours:feng});
    }
    showToast('🎉 新增成功！');
  }
  setData(data);resetForm();renderAll();
}

function startEdit(id){
  const r=getData().find(x=>x.id===id);
  if(!r)return;
  editingId=id;
  document.getElementById('inputDay').value=r.day;
  document.getElementById('inputLoc').value=r.location||'';
  document.getElementById('inputJie').value=r.jieHours||'';
  document.getElementById('inputFeng').value=r.fengHours||'';
  document.getElementById('formTitle').textContent='✏️ 編輯記錄';
  document.getElementById('submitBtn').textContent='💾 儲存';
  document.getElementById('cancelBtn').style.display='block';
  const b=document.getElementById('editBanner');
  b.textContent=`✦ 正在編輯：${curYear}/${String(curMonth).padStart(2,'0')}/${r.day}`;
  b.classList.add('show');
  document.getElementById('inputLoc').focus();
  window.scrollTo({top:0,behavior:'smooth'});
}

function cancelEdit(){editingId=null;resetForm();}

function delRecord(id){
  if(!confirm('確定要刪除這筆記錄嗎？ 🥺'))return;
  setData(getData().filter(r=>r.id!==id));
  if(editingId===id)resetForm();
  showToast('🗑️ 已刪除');renderAll();
}

function resetForm(){
  editingId=null;
  document.getElementById('mainForm').reset();
  document.getElementById('inputJie').value='';
  document.getElementById('inputFeng').value='';
  document.getElementById('formTitle').textContent='📝 新增記錄';
  document.getElementById('submitBtn').textContent='✨ 新增';
  document.getElementById('cancelBtn').style.display='none';
  document.getElementById('editBanner').classList.remove('show');
  populateDaySelect();
}

function toggleTable(){
  const sec=document.getElementById('tableSection');
  const btn=document.getElementById('btnReport');
  const open=sec.classList.toggle('open');
  btn.textContent=open?'📊 收起月報表':'📊 查看月報表';
  if(open){renderTable();sec.scrollIntoView({behavior:'smooth',block:'start'});}
}

function renderTable(){
  const recs=getData().filter(r=>r.year===curYear&&r.month===curMonth);
  const byDay={};recs.forEach(r=>{byDay[r.day]=r;});
  const days=daysInMonth(curYear,curMonth);
  const tb=document.getElementById('tableBody');
  tb.innerHTML='';
  let tj=0,tf=0;
  for(let d=1;d<=days;d++){
    const r=byDay[d];
    const j=r?(parseFloat(r.jieHours)||0):0;
    const f=r?(parseFloat(r.fengHours)||0):0;
    tj+=j;tf+=f;
    const isLeave=r&&r.location==='請假';
    const isNocall=r&&r.location==='沒叫';
    const cls=isLeave?'t-leave':isNocall?'t-nocall':'';
    const locText=r&&r.location?r.location:'';
    const tr=document.createElement('tr');
    if(cls)tr.className=cls;
    tr.innerHTML=`<td class="t-day">${d}</td>
<td class="t-loc">${locText?emoji(locText)+' '+locText:''}</td>
<td class="t-num">${j||''}</td>
<td class="t-num">${f||''}</td>`;
    tb.appendChild(tr);
  }
  const tot=document.createElement('tr');
  tot.className='t-total';
  tot.innerHTML=`<td></td><td class="total-label" style="text-align:center">總計</td>
<td>${tj%1?tj.toFixed(1):tj||''}</td>
<td>${tf%1?tf.toFixed(1):tf||''}</td>`;
  tb.appendChild(tot);
}

function renderAll(){
  const mn=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('monthLabel').textContent=`${curYear} 年 ${mn[curMonth-1]}`;
  document.getElementById('btnPrev').disabled=(curYear===S_YEAR&&curMonth===S_MONTH);
  populateDaySelect();renderList();
  if(document.getElementById('tableSection').classList.contains('open'))renderTable();
}

renderAll();
</script>
</body>
</html>
